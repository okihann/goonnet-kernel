name: Build Garnet Kernel (SuKiSU + GPU OC)

on:
  push:
    paths:
      - '.github/workflows/build-kernel.yml'
  workflow_dispatch:
    inputs:
      gpu_oc_freq:
        description: 'GPU OC freq in Hz (new top level added above stock 940MHz)'
        default: '1000000000'
        required: true
      gpu_oc_acd:
        description: 'ACD level for OC freq (hex, stock 940M = 0xA82B5FFD)'
        default: '0xA82B5FFD'
        required: true
      apply_uv:
        description: 'Apply undervolt to stock 940MHz and below?'
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      sukisu_variant:
        description: 'SuKiSU variant'
        default: 'main'
        type: choice
        options:
          - 'main'

jobs:
  build:
    name: Build Kernel
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/share/swift /usr/local/lib/android /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          sudo docker system prune -af 2>/dev/null || true

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git bc bison flex libssl-dev libelf-dev python3 python3-pip \
            zip unzip curl wget gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            make libncurses-dev cpio pahole clang lld llvm device-tree-compiler \
            openjdk-11-jdk-headless
          pip3 install --quiet absl-py

      - name: Clone okihann garnet_kernel (Private)
        uses: actions/checkout@v4
        with:
          repository: okihann/garnet-kernel
          ref: garnet-t-oss
          token: ${{ secrets.GH_PAT }}
          path: kernel

      - name: Clone okihann garnet_devicetree (Private)
        uses: actions/checkout@v4
        with:
          repository: okihann/garnet-devicetree
          ref: garnet-t-oss
          token: ${{ secrets.GH_PAT }}
          path: kernel/kernel_devicetree

      - name: Apply SuKiSU & SUSFS Hooks
        working-directory: kernel
        run: |
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s ${{ github.event.inputs.sukisu_variant || 'main' }}

          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b gki-android12-5.10
          cp susfs4ksu/kernel_patches/fs/* fs/
          cp susfs4ksu/kernel_patches/include/linux/* include/linux/
          
          sed -i '/diff --git a\/security\/selinux\/avc\.c/,$d' susfs4ksu/kernel_patches/50_add_susfs_in_gki-android12-5.10.patch
          patch -p1 < susfs4ksu/kernel_patches/50_add_susfs_in_gki-android12-5.10.patch || true

          cd KernelSU
          
          sed -i '1i #include <linux/susfs.h>' kernel/supercall/supercall.h
          sed -i '1i #include <linux/susfs.h>' kernel/supercall/supercall.c
          sed -i '1i #include <linux/susfs.h>' uapi/supercall.h
          
          sed -i '/return -EPERM;/i \	if (susfs_is_susfs_enabled && cmd == CMD_SUSFS_CONTROL) return 0;' kernel/supercall/supercall.c
          
          CMD_DEF=$(grep -h "define.*CMD_SUSFS_CONTROL" ../susfs4ksu/kernel_patches/KernelSU/*.patch 2>/dev/null | sed 's/^+//' || true)
          if [ ! -z "$CMD_DEF" ]; then
            sed -i "2i $CMD_DEF" uapi/supercall.h
          fi

      - name: Fix broken Xiaomi & SukiSU dependencies
        working-directory: kernel
        run: |

          if [ -f "drivers/kernelsu/kpm/kpm.h" ]; then
            sed -i 's/static const __u32 KSU_IOCTL_KPM _IOC/#define KSU_IOCTL_KPM _IOC/g' drivers/kernelsu/kpm/kpm.h
          fi
          
          echo "KBUILD_CFLAGS += -Wno-error" >> Makefile
          echo "KBUILD_CPPFLAGS += -Wno-error" >> Makefile

          sed -i '/hwid/d' drivers/misc/Makefile
          sed -i '/plaid/d' drivers/misc/Makefile
          sed -i 's|^source "drivers/misc/hwid/Kconfig"|# source "drivers/misc/hwid/Kconfig"|' drivers/misc/Kconfig
          sed -i 's|^source "drivers/misc/plaid/Kconfig"|# source "drivers/misc/plaid/Kconfig"|' drivers/misc/Kconfig
          
          echo -e "#ifndef _HWID_H_\n#define _HWID_H_\nstatic inline int get_hw_country_version(void) { return 0; }\nstatic inline int get_hw_version_platform(void) { return 0; }\n#endif" > dummy_hwid.h
          grep -rl "hwid.h" . | xargs -I {} dirname {} | sort -u | while read -r dir; do cp dummy_hwid.h "$dir/hwid.h"; done
          rm dummy_hwid.h
          
          python3 -c "
          content = open('drivers/usb/gadget/udc/core.c').read()
          funcs = ['usb_gadget_enable_async_callbacks', 'usb_gadget_disable_async_callbacks']
          for f in funcs:
              parts = content.split('static inline void ' + f)
              if len(parts) > 2:
                  content = parts[0] + 'static inline void ' + f + parts[1] + '#if 0\nstatic inline void ' + f + parts[2] + '#endif\n'
          open('drivers/usb/gadget/udc/core.c', 'w').write(content)
          "
          
      - name: Configure and Patch Kernel
        working-directory: kernel
        run: |
          append_if_missing() {
            grep -qF "$1" "$CONFIG_FILE" || echo "$1" >> "$CONFIG_FILE"
          }
          
          export CONF="make O=out ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu-"
          $CONF gki_defconfig

          CONSOLIDATE=$(find arch/arm64/configs/vendor -name "garnet_consolidate.config" | sed 's|arch/arm64/configs/||')
          [ ! -z "$CONSOLIDATE" ] && $CONF "$CONSOLIDATE"
          GKI_FRAG=$(find arch/arm64/configs/vendor -name "garnet_GKI.config" | sed 's|arch/arm64/configs/||')
          [ ! -z "$GKI_FRAG" ] && $CONF "$GKI_FRAG"
          
          CONFIG_FILE="out/.config"

          append_if_missing "CONFIG_TCP_CONG_BBR=y"
          append_if_missing 'CONFIG_DEFAULT_TCP_CONG="bbr"'
          append_if_missing "CONFIG_ZRAM=y"
          append_if_missing "CONFIG_ZSMALLOC=y"
          append_if_missing "CONFIG_CRYPTO_LZ4=y"
          append_if_missing "CONFIG_CRYPTO_ZSTD=y"

          append_if_missing "CONFIG_KSU=y"
          append_if_missing "CONFIG_KSU_SUSFS=y"
          append_if_missing "CONFIG_KSU_SUSFS_SUS_PATH=y"
          append_if_missing "CONFIG_KSU_SUSFS_SUS_MOUNT=y"
          append_if_missing "CONFIG_KSU_SUSFS_SPOOF_UNAME=y"
          append_if_missing "CONFIG_KSU_SUSFS_ENABLE_ALGO=y"
          
          append_if_missing "CONFIG_UBSAN=n"
          append_if_missing "CONFIG_KASAN=n"
          append_if_missing "CONFIG_INIT_STACK_NONE=y"
          append_if_missing "CONFIG_INIT_ON_ALLOC_DEFAULT_ON=n"
          append_if_missing "CONFIG_INIT_ON_FREE_DEFAULT_ON=n"

          $CONF olddefconfig
      
      - name: Patch GPU freq table (OC + UV)
        run: |
          python3 kernel/patch_gpu_dtsi.py \
            --dtsi kernel/kernel_devicetree/qcom/parrot-gpu.dtsi \
            --oc-freq ${{ github.event.inputs.gpu_oc_freq || '1000000000' }} \
            --oc-acd "${{ github.event.inputs.gpu_oc_acd || '0xA82B5FFD' }}" \
            --apply-uv ${{ github.event.inputs.apply_uv || 'true' }}

      - name: Build kernel (make)
        working-directory: kernel
        run: |
          set -o pipefail
          {
            make O=out ARCH=arm64 -j$(nproc) CC=clang CROSS_COMPILE=aarch64-linux-gnu- LLVM=1 LLVM_IAS=1
          } 2>&1 | tee ../build.log

      - name: Collect artifacts
        run: |
          mkdir -p artifacts/dtbs
          cp kernel/kernel_devicetree/qcom/parrot-gpu.dtsi artifacts/patched_gpu_source.dtsi || true
          find kernel/out -name "Image" -exec cp {} artifacts/ \; 2>/dev/null || true
          find kernel/out -name "dtbo.img" -exec cp {} artifacts/ \; 2>/dev/null || true
          find kernel/out -name "*.dtb" -exec cp {} artifacts/dtbs/ \; 2>/dev/null || true

      - name: Upload kernel images
        uses: actions/upload-artifact@v4
        with:
          name: garnet-kernel-${{ github.event.inputs.gpu_oc_freq || '1000000000' }}hz
          path: artifacts/
          retention-days: 7

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
