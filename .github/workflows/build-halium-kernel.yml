name: Build Garnet Halium Kernel

on:
  push:
    paths:
      - '.github/workflows/build-halium.yml'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to checkout (e.g., garnet-halium)'
        default: 'garnet-t-oss'
        required: true

jobs:
  build-halium:
    name: Build Halium Kernel
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git bc bison flex libssl-dev libelf-dev python3 python3-pip \
            zip unzip curl wget gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            make libncurses-dev cpio pahole clang lld llvm device-tree-compiler
          pip3 install --quiet absl-py

      - name: Clone okihann garnet_kernel (Private)
        uses: actions/checkout@v4
        with:
          repository: okihann/garnet-kernel
          ref: ${{ github.event.inputs.branch || 'garnet-halium' }}
          token: ${{ secrets.GH_PAT }}
          path: kernel

      - name: Clone okihann garnet_devicetree (Private)
        uses: actions/checkout@v4
        with:
          repository: okihann/garnet-devicetree
          ref: ${{ github.event.inputs.branch || 'garnet-halium' }}
          token: ${{ secrets.GH_PAT }}
          path: kernel/kernel_devicetree

      - name: Fix Xiaomi Source Bugs
        working-directory: kernel
        run: |
          # 1. Remove broken Kconfig references
          sed -i '/hwid/d' drivers/misc/Makefile
          sed -i '/plaid/d' drivers/misc/Makefile
          sed -i 's|^source "drivers/misc/hwid/Kconfig"|# source "drivers/misc/hwid/Kconfig"|' drivers/misc/Kconfig
          sed -i 's|^source "drivers/misc/plaid/Kconfig"|# source "drivers/misc/plaid/Kconfig"|' drivers/misc/Kconfig
          
          # 2. Generate a Dummy hwid.h
          echo "#ifndef _HWID_H_" > dummy_hwid.h
          echo "#define _HWID_H_" >> dummy_hwid.h
          echo "static inline int get_hw_country_version(void) { return 0; }" >> dummy_hwid.h
          echo "static inline int get_hw_version_platform(void) { return 0; }" >> dummy_hwid.h
          grep -rE "HARDWARE_PROJECT_|Country[A-Z]" . --exclude="dummy_hwid.h" | grep -oE "HARDWARE_PROJECT_[A-Z0-9_]+|Country[A-Z][a-zA-Z]+" | sort -u | while read -r line; do
            echo "#define $line 0" >> dummy_hwid.h
          done
          echo "#endif" >> dummy_hwid.h
          
          # 3. Copy the dummy file into any directory asking for it
          grep -rl "hwid.h" . | xargs -I {} dirname {} | sort -u | while read -r dir; do
            cp dummy_hwid.h "$dir/hwid.h"
          done
          
          # 4. Generate a Dummy plaid.h
          PLAID_CALLER=$(grep -rl "plaid.h" . | head -1)
          if [ ! -z "$PLAID_CALLER" ]; then
            PLAID_DIR=$(dirname "$PLAID_CALLER")
            echo "/* Dummy */" > "$PLAID_DIR/plaid.h"
          fi
          rm dummy_hwid.h

          # 5. Fix duplicate USB gadget functions (Your original Python fix)
          python3 -c "
          import sys
          content = open('drivers/usb/gadget/udc/core.c').read()
          funcs = ['usb_gadget_enable_async_callbacks', 'usb_gadget_disable_async_callbacks']
          for f in funcs:
              parts = content.split('static inline void ' + f)
              if len(parts) > 2:
                  sub_parts = parts[2].split('}', 1)
                  if len(sub_parts) == 2:
                      content = parts[0] + 'static inline void ' + f + parts[1] + '#if 0\nstatic inline void ' + f + sub_parts[0] + '}\n#endif\n' + sub_parts[1]
          open('drivers/usb/gadget/udc/core.c', 'w').write(content)
          "
      - name: Generate base .config
        working-directory: kernel
        run: |
          export CONF="make O=out ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu-"
          
          # Allow warnings so Halium strictness doesn't break compilation
          echo "KBUILD_CFLAGS += -Wno-error" >> Makefile
          echo "KBUILD_CPPFLAGS += -Wno-error" >> Makefile
          
          $CONF gki_defconfig
          CONSOLIDATE=$(find arch/arm64/configs/vendor -name "garnet_consolidate.config" | sed 's|arch/arm64/configs/||')
          [ ! -z "$CONSOLIDATE" ] && $CONF "$CONSOLIDATE"
          GKI_FRAG=$(find arch/arm64/configs/vendor -name "garnet_GKI.config" | sed 's|arch/arm64/configs/||')
          [ ! -z "$GKI_FRAG" ] && $CONF "$GKI_FRAG"

      - name: Auto-Patch Halium Requirements
        working-directory: kernel
        run: |
          wget https://raw.githubusercontent.com/Halium/halium-boot/master/check-kernel-config
          chmod +x check-kernel-config
          
          echo "=== Scanning for required patches ==="
          ./check-kernel-config out/.config > halium_reqs.txt || true
          
          echo "=== Injecting Patches into .config ==="
          grep -E "(set it|unset it)" halium_reqs.txt | while read -r line; do
            # Strictly extract only the CONFIG_XXXX string
            CONF_NAME=$(echo "$line" | grep -oE "CONFIG_[a-zA-Z0-9_]+")
            
            # Make sure it isn't blank before injecting
            if [ ! -z "$CONF_NAME" ]; then
              if echo "$line" | grep -q "is not set, set it"; then
                echo "Enabling: $CONF_NAME"
                echo "${CONF_NAME}=y" >> out/.config
              elif echo "$line" | grep -q "is set, unset it"; then
                echo "Disabling: $CONF_NAME"
                echo "${CONF_NAME}=n" >> out/.config
              fi
            fi
          done
          
          echo "=== Validating New Config ==="
          # olddefconfig safely accepts the default values for any new dependencies
          make O=out ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig
      - name: Compile Halium Kernel
        working-directory: kernel
        run: |
          set -o pipefail
          {
            make O=out ARCH=arm64 -j$(nproc) CC=clang CROSS_COMPILE=aarch64-linux-gnu- LLVM=1 LLVM_IAS=1
          } 2>&1 | tee ../build.log

      - name: Package Halium with AnyKernel3
        run: |
          # 1. Clone AnyKernel3 and clean it up
          git clone https://github.com/osm0sis/AnyKernel3.git -b master AnyKernel3
          rm -rf AnyKernel3/.git AnyKernel3/README.md
          
          # 2. ONLY copy the compiled Halium kernel. Do NOT touch DTBs.
          find kernel/out -name "Image" -exec cp {} AnyKernel3/ \; 2>/dev/null || true
          
          # 3. Download the official Halium Ramdisk directly (Only 5MB!)
          echo "Fetching official Halium Ramdisk..."
          wget -qO AnyKernel3/halium-ramdisk.img https://github.com/halium/initramfs-tools-halium/releases/download/dynparts/initrd.img-touch-arm64
          
          cd AnyKernel3
          
          # 4. Configure anykernel.sh for Garnet
          sed -i 's/device.name1=maguro/device.name1=garnet/' anykernel.sh
          sed -i 's/device.name2=toro/device.name2=/' anykernel.sh
          sed -i 's/device.name3=toroplus/device.name3=/' anykernel.sh
          sed -i 's/device.name4=tuna/device.name4=/' anykernel.sh
          
          # FIX: Uppercase variables to fix the boot partition mapping!
          sed -i 's/BLOCK=.*/BLOCK=auto;/' anykernel.sh
          sed -i 's/IS_SLOT_DEVICE=.*/IS_SLOT_DEVICE=auto;/' anykernel.sh
          
          # 5. Forcibly inject the Ramdisk & Cmdline patches BEFORE write_boot
          sed -i '/write_boot/i ui_print "Injecting official Halium Ramdisk...";' anykernel.sh
          sed -i '/write_boot/i rm -f $split_img/*-ramdisk*;' anykernel.sh
          sed -i '/write_boot/i cp $home/halium-ramdisk.img $split_img/boot.img-ramdisk.gz;' anykernel.sh
          sed -i '/write_boot/i patch_cmdline "rw" "rw";' anykernel.sh
          sed -i '/write_boot/i patch_cmdline "rootwait" "rootwait";' anykernel.sh
          
          # 6. Finalize AnyKernel script
          sed -i '/# init.rc/,$d' anykernel.sh
          echo "write_boot; # repacks the new Image and flashes it" >> anykernel.sh
          echo "## end boot install" >> anykernel.sh

          # 7. Compress into the final Zip
          zip -r9 ../Garnet-Halium-AnyKernel3.zip *

      - name: Upload Halium Flashable Zip
        uses: actions/upload-artifact@v4
        with:
          name: Halium-AnyKernel3-Garnet
          path: Garnet-Halium-AnyKernel3.zip
          retention-days: 7
